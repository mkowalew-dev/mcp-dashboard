<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" width="620" height="400">
  <defs>
    <style>
      .title { font: 600 14px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .muted { font: 10px 'Segoe UI', system-ui, sans-serif; fill: #7B8FAD; }
      .box { fill: #1A2332; stroke: #049FD9; stroke-width: 1.5; rx: 6; }
      .arrow { stroke: #049FD9; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrow-cache { stroke: #00D68F; stroke-width: 1.2; fill: none; marker-end: url(#arrG); }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#049FD9"/></marker>
    <marker id="arrG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#00D68F"/></marker>
  </defs>
  <rect width="620" height="400" fill="#0B1120"/>
  <text x="310" y="26" text-anchor="middle" class="title">Request Flow  Dashboard Load &amp; Polling</text>

  <!-- User -->
  <rect x="24" y="48" width="100" height="44" class="box"/>
  <text x="74" y="72" text-anchor="middle" class="label">User</text>
  <text x="74" y="86" text-anchor="middle" class="muted">opens URL</text>

  <!-- Browser -->
  <rect x="24" y="120" width="100" height="100" class="box"/>
  <text x="74" y="148" text-anchor="middle" class="label">Browser</text>
  <text x="74" y="168" text-anchor="middle" class="muted">1. GET /</text>
  <text x="74" y="185" text-anchor="middle" class="muted">2. GET /api/data</text>
  <text x="74" y="202" text-anchor="middle" class="muted">   ?window=24h</text>
  <text x="74" y="222" text-anchor="middle" class="muted">3. setInterval ĺ</text>
  <text x="74" y="238" text-anchor="middle" class="muted">   repeat 2</text>

  <!-- Flask -->
  <rect x="180" y="48" width="260" height="200" class="box"/>
  <text x="310" y="72" text-anchor="middle" class="label">Flask (server.py)</text>
  <rect x="196" y="82" width="228" height="38" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="4"/>
  <text x="310" y="102" text-anchor="middle" class="muted">GET / ĺ send_file(noc_dashboard.html)</text>
  <rect x="196" y="128" width="228" height="78" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="4"/>
  <text x="310" y="148" text-anchor="middle" class="muted">GET /api/data?window=</text>
  <text x="310" y="165" text-anchor="middle" class="muted">Validate window  {1h,6h,12h,24h,2d,7d}</text>
  <text x="310" y="182" text-anchor="middle" class="muted">If base_cache empty ĺ 503</text>
  <text x="310" y="199" text-anchor="middle" class="muted">Else: merge base + metrics_cache[window]</text>
  <text x="310" y="216" text-anchor="middle" class="muted">+ extra_kpi_cache[window]; add refresh_interval_minutes</text>
  <rect x="196" y="214" width="228" height="28" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="4"/>
  <text x="310" y="232" text-anchor="middle" class="muted">Optional: GET /api/fetch_window?window= ĺ on-demand metrics</text>

  <!-- Cache -->
  <rect x="480" y="48" width="120" height="120" class="box"/>
  <text x="540" y="72" text-anchor="middle" class="label">In-memory</text>
  <text x="540" y="92" text-anchor="middle" class="label">caches</text>
  <text x="540" y="115" text-anchor="middle" class="muted">base_cache</text>
  <text x="540" y="132" text-anchor="middle" class="muted">metrics_cache</text>
  <text x="540" y="149" text-anchor="middle" class="muted">extra_kpi_cache</text>
  <text x="540" y="166" text-anchor="middle" class="muted">(thread lock)</text>

  <!-- Arrows -->
  <path class="arrow" d="M 124 70 L 172 70"/>
  <path class="arrow" d="M 124 160 L 172 160"/>
  <text x="148" y="154" class="muted" font-size="9">HTML</text>
  <path class="arrow" d="M 124 195 L 172 195"/>
  <path class="arrow-cache" d="M 440 120 L 472 120"/>
  <text x="456" y="112" class="muted" font-size="9">read</text>
  <path class="arrow-cache" d="M 472 148 L 440 148"/>
  <text x="456" y="140" class="muted" font-size="9">data</text>
  <path class="arrow" d="M 440 195 L 124 195"/>
  <text x="282" y="188" class="muted" font-size="9">JSON</text>

  <!-- Other endpoints -->
  <rect x="24" y="260" width="576" height="128" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="6"/>
  <text x="40" y="284" class="label">Other API endpoints (for demos)</text>
  <text x="40" y="308" class="muted">" GET /api/health  Liveness; base_cache_ready; last_base_refresh; refresh_interval_minutes. Use for load balancers or monitoring.</text>
  <text x="40" y="328" class="muted">" GET /api/agent_perf/&lt;test_id&gt;  Per-test agent breakdown (metric by test type). test_id validated (numeric or ep-xxx).</text>
  <text x="40" y="348" class="muted">" POST /api/refresh  Starts scheduled_refresh() in a background thread (base ĺ 24h metrics). Returns immediately with { status: \"refresh started\" }.</text>
  <text x="40" y="368" class="muted">" All /api/* responses include X-Content-Type-Options: nosniff and Cache-Control: no-store.</text>
</svg>
