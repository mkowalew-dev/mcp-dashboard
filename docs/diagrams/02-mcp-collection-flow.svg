<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <style>
      .title { font: 600 14px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .muted { font: 10px 'Segoe UI', system-ui, sans-serif; fill: #7B8FAD; }
      .box { fill: #1A2332; stroke: #049FD9; stroke-width: 1.5; rx: 6; }
      .box-parallel { fill: rgba(0,214,143,0.08); stroke: #00D68F; stroke-width: 1; rx: 6; }
      .arrow { stroke: #049FD9; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .arrow-seq { stroke: #F7B500; stroke-width: 1.2; fill: none; marker-end: url(#ah2); }
    </style>
    <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#049FD9"/></marker>
    <marker id="ah2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#F7B500"/></marker>
  </defs>
  <rect width="700" height="520" fill="#0B1120"/>
  <text x="350" y="26" text-anchor="middle" class="title">MCP Data Collection Flow</text>

  <!-- Phase 1: Base refresh (parallel) -->
  <rect x="20" y="44" width="660" height="118" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="6"/>
  <text x="40" y="68" class="label">Phase 1  Base refresh (async, parallel groups)</text>
  <rect x="40" y="78" width="180" height="72" class="box-parallel"/>
  <text x="130" y="98" text-anchor="middle" class="muted">asyncio.gather(3)</text>
  <text x="130" y="115" text-anchor="middle" class="muted">list_network_app_</text>
  <text x="130" y="128" text-anchor="middle" class="muted">synthetics_tests</text>
  <text x="130" y="145" text-anchor="middle" class="muted">list_endpoint_agent_tests</text>
  <text x="130" y="158" text-anchor="middle" class="muted">get_account_groups</text>
  <rect x="240" y="78" width="180" height="72" class="box-parallel"/>
  <text x="330" y="98" text-anchor="middle" class="muted">asyncio.gather(2)</text>
  <text x="330" y="118" text-anchor="middle" class="muted">list_cloud_enterprise_agents</text>
  <text x="330" y="135" text-anchor="middle" class="muted">list_endpoint_agents</text>
  <rect x="440" y="78" width="220" height="72" class="box-parallel"/>
  <text x="550" y="98" text-anchor="middle" class="muted">asyncio.gather(3)</text>
  <text x="550" y="118" text-anchor="middle" class="muted">list_alerts (state=TRIGGER)</text>
  <text x="550" y="135" text-anchor="middle" class="muted">list_events</text>
  <text x="550" y="152" text-anchor="middle" class="muted">search_outages (24h)</text>
  <path class="arrow-seq" d="M 350 170 L 350 192"/>
  <text x="355" y="184" class="muted" font-size="9">then</text>

  <!-- Phase 2: Metrics (batched) -->
  <rect x="20" y="198" width="660" height="200" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="6"/>
  <text x="40" y="222" class="label">Phase 2  24h metrics (batched, parallel per batch)</text>
  <text x="40" y="242" class="muted">Test IDs from base cache; synth_ids in batches of MCP_BATCH_SIZE (default 20). Delay MCP_INTER_BATCH_DELAY_SEC between batches.</text>
  <rect x="40" y="254" width="300" height="130" class="box"/>
  <text x="190" y="278" text-anchor="middle" class="label">Availability (parallel per batch)</text>
  <text x="190" y="298" text-anchor="middle" class="muted">WEB_AVAILABILITY +</text>
  <text x="190" y="312" text-anchor="middle" class="muted">DNS_TRACE_AVAILABILITY</text>
  <text x="190" y="332" text-anchor="middle" class="muted">then NET_LOSS,</text>
  <text x="190" y="346" text-anchor="middle" class="muted">ONE_WAY_NET_LOSS_TO_TARGET</text>
  <text x="190" y="366" text-anchor="middle" class="muted">(first-wins merge)</text>
  <rect x="360" y="254" width="300" height="130" class="box"/>
  <text x="510" y="278" text-anchor="middle" class="label">Extra KPIs (parallel per batch)</text>
  <text x="510" y="298" text-anchor="middle" class="muted">Response: WEB_TTFB,</text>
  <text x="510" y="312" text-anchor="middle" class="muted">DNS_SERVER_TIME, DNS_TRACE_QUERY_TIME</text>
  <text x="510" y="332" text-anchor="middle" class="muted">Loss / Jitter / Latency trios;</text>
  <text x="510" y="346" text-anchor="middle" class="muted">VoIP (MOS, latency, loss, PDV);</text>
  <text x="510" y="366" text-anchor="middle" class="muted">BGP, API, Web Txn, Page Load</text>
  <path class="arrow-seq" d="M 350 412 L 350 434"/>
  <text x="355" y="426" class="muted" font-size="9">then</text>

  <!-- Phase 3: Endpoint + cache -->
  <rect x="20" y="440" width="660" height="68" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="6"/>
  <text x="40" y="464" class="label">Phase 3  Endpoint metrics + cache write</text>
  <text x="40" y="482" class="muted">asyncio.gather(3): get_endpoint_agent_metrics (LATENCY, WIRELESS_RSSI, LOSS). Merge into extra_kpi_cache. Write base_cache, metrics_cache, extra_kpi_cache.</text>
  <text x="40" y="500" class="muted">On-demand /api/agent_perf/: single get_network_app_synthetics_metrics with group_by SOURCE_AGENT for one test_id.</text>
</svg>
