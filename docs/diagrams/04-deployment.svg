<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <style>
      .title { font: 600 14px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .label { font: 11px 'Segoe UI', system-ui, sans-serif; fill: #E8ECF4; }
      .muted { font: 10px 'Segoe UI', system-ui, sans-serif; fill: #7B8FAD; }
      .box { fill: #1A2332; stroke: #049FD9; stroke-width: 1.5; rx: 8; }
      .box-env { fill: rgba(247,181,0,0.08); stroke: #F7B500; stroke-width: 1; rx: 6; }
      .arrow { stroke: #049FD9; stroke-width: 1.5; fill: none; marker-end: url(#ar); }
    </style>
    <marker id="ar" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#049FD9"/></marker>
  </defs>
  <rect width="640" height="360" fill="#0B1120"/>
  <text x="320" y="26" text-anchor="middle" class="title">Deployment Topology  Sales Engineer Install</text>

  <!-- Host -->
  <rect x="24" y="44" width="592" height="200" fill="#111827" stroke="rgba(255,255,255,0.08)" rx="8"/>
  <text x="40" y="68" class="label">Host (Windows / macOS / Linux)</text>
  <text x="40" y="88" class="muted">Outbound HTTPS to api.thousandeyes.com required. No inbound firewall rule needed if only local access.</text>

  <!-- Python venv -->
  <rect x="40" y="100" width="280" height="128" class="box"/>
  <text x="180" y="124" text-anchor="middle" class="label">Python 3.10+ venv</text>
  <text x="180" y="144" text-anchor="middle" class="muted">.venv/ (or venv/)</text>
  <text x="180" y="164" text-anchor="middle" class="muted">pip install -r requirements.txt</text>
  <text x="180" y="184" text-anchor="middle" class="muted">flask, mcp[cli], python-dotenv,</text>
  <text x="180" y="200" text-anchor="middle" class="muted">apscheduler, httpx</text>
  <text x="180" y="220" text-anchor="middle" class="muted">Run: python server.py</text>

  <!-- Env -->
  <rect x="340" y="100" width="260" height="128" class="box-env"/>
  <text x="470" y="124" text-anchor="middle" class="label">Environment / .env</text>
  <text x="470" y="148" text-anchor="middle" class="muted">TE_TOKEN (required)</text>
  <text x="470" y="168" text-anchor="middle" class="muted">REFRESH_MINUTES=15</text>
  <text x="470" y="188" text-anchor="middle" class="muted">MCP_BATCH_SIZE=20</text>
  <text x="470" y="208" text-anchor="middle" class="muted">MCP_INTER_BATCH_DELAY_SEC=0.35</text>
  <text x="470" y="228" text-anchor="middle" class="muted">MCP_URL (optional override)</text>

  <!-- Listener -->
  <rect x="40" y="252" width="560" height="88" class="box"/>
  <text x="320" y="276" text-anchor="middle" class="label">Server process</text>
  <text x="320" y="296" text-anchor="middle" class="muted">Binds 0.0.0.0:5051 (all interfaces). First run: full base + 24h metrics fetch; then scheduler every REFRESH_MINUTES.</text>
  <text x="320" y="316" text-anchor="middle" class="muted">Customer browser: http://&lt;host&gt;:5051/  or place behind reverse proxy (HTTPS, auth) for remote demos.</text>
  <text x="320" y="336" text-anchor="middle" class="muted">Health check: GET http://&lt;host&gt;:5051/api/health</text>

  <!-- External -->
  <rect x="24" y="268" width="12" height="12" fill="#00D68F" rx="2"/>
  <text x="44" y="278" class="muted">Outbound ’ ThousandEyes MCP (HTTPS)</text>
</svg>
