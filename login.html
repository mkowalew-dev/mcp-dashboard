<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — MCP Dashboard Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --te-blue: #049FD9;
    --te-dark: #0B1120;
    --te-dark-2: #111827;
    --te-dark-3: #1A2332;
    --te-border: rgba(255,255,255,0.08);
    --te-text: #E8ECF4;
    --te-text-dim: #7B8FAD;
    --te-red: #EF4444;
    --radius: 10px;
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:var(--te-dark); color:var(--te-text); font-family:var(--font-body); display:flex; align-items:center; justify-content:center; padding:24px; -webkit-font-smoothing:antialiased; }
  .card { width:100%; max-width:400px; background:var(--te-dark-2); border:1px solid var(--te-border); border-radius:var(--radius); padding:40px 32px 44px; }
  .login-head { display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:28px; }
  .te-logo-icon { display:flex; align-items:center; justify-content:center; }
  .te-logo-icon svg { height:40px; width:auto; }
  .login-title { font-size:22px; font-weight:700; text-align:center; margin:20px 0 0; letter-spacing:-0.02em; color:var(--te-text); line-height:1.25; }
  label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--te-text-dim); margin-bottom:8px; }
  input[type=text], input[type=password] { width:100%; padding:12px 14px; border-radius:8px; border:1px solid var(--te-border); background:var(--te-dark-3); color:var(--te-text); font:inherit; font-size:14px; margin-bottom:18px; }
  input:focus { outline:2px solid var(--te-blue); outline-offset:2px; border-color:var(--te-blue); }
  .form-actions { display:flex; justify-content:center; margin-top:12px; }
  button[type=submit] { min-width:180px; padding:12px 28px; font:inherit; font-size:13px; font-weight:600; border-radius:8px; border:1px solid var(--te-blue); background:rgba(4,159,217,0.15); color:var(--te-blue); cursor:pointer; transition:background 0.2s, color 0.2s; }
  button[type=submit]:hover { background:var(--te-blue); color:var(--te-dark); }
  button[type=submit]:focus-visible { outline:2px solid var(--te-blue); outline-offset:2px; }
  .err { display:none; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35); color:var(--te-red); font-size:12px; padding:10px 12px; border-radius:8px; margin-bottom:18px; text-align:center; }
  .err.visible { display:block; }
</style>
</head>

    <h1 class="login-title">MCP Dashboard Demo</h1>
  </header>
  <div class="err" id="err">Invalid username or password</div>
  <form method="post" action="/login" autocomplete="on">
    <input type="hidden" name="next" id="next" value="/" />
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required />
    <div class="form-actions">
      <button type="submit">Sign in</button>
    </div>
  </form>
</div>
<script>
(function(){
  var q = new URLSearchParams(location.search);
  var n = q.get("next");
  if (n && n.charAt(0) === "/" && n.charAt(1) !== "/") document.getElementById("next").value = n;
  if (q.get("err") === "1") document.getElementById("err").classList.add("visible");
})();
</script>
</body>
</html>
